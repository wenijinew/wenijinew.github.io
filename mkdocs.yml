repo_name: Bruce Wen's Notes
repo_url: https://github.com/wenijinew/wenijinew.github.io
edit_uri: edit/main/docs/

site_name: Bruce Wen's Notes

extra_css:
  - "css/extra.css"

theme:
  font:
    text: "Roboto"
    code: "Roboto Mono"
  name:
        material
  custom_dir: docs/overrides
  features:
        - search.suggest
        - search.highlight
        - content.action.edit
        - content.code.copy
        - content.code.annotate
        - content.code.select
        - content.footnote.tooltips
        - navigation.expand
        - navigation.top
        - navigation.footer
        - toc.follow
        - announce.dismiss
  palette:
    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  icon:
    admonition:
        note: octicons/tag-16
        abstract: octicons/checklist-16
        info: octicons/info-16
        tip: octicons/squirrel-16
        success: octicons/check-16
        question: octicons/question-16
        warning: octicons/alert-16
        failure: octicons/x-circle-16
        danger: octicons/zap-16
        bug: octicons/bug-16
        example: octicons/beaker-16
        quote: octicons/quote-16
    tag:
      work: fontawesome/solid/pen-nib
plugins:
  - search
  - tags

markdown_extensions:
  - abbr
  - toc:
      permalink: true
  - footnotes
  - pymdownx.highlight:
      anchor_linenums: true
  - admonition
  - pymdownx.details     
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.critic
  - pymdownx.caret
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.tilde
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Home: index.md
  - AI & Data:
      - Deep Learning Fundamentals: ai/deep-learning-fundamentals.md
      - Data Engineering: ai/data-engineering.md
      - AI Impact 30-Year Outlook: ai/ai-impact-30-year-outlook.md
  - Git:
      - Overview: git/index.md
      - Tips: git/001.tip.md
  - GitHub:
      - Overview: github/index.md
      - Pages: github/pages.md
  - IDE:
      - Overview: ide/index.md
      - Emacs: ide/emacs.md
      - Spacemacs: ide/spacemacs.md
      - Neovim: ide/neovim.md
      - Vim: ide/vim.md
      - VS Code: ide/vscode.md
      - SpaceVim: ide/spacevim.md
  - Bash: bash/index.md
  - MkDocs: mkdocs/index.md
  - Tools: note/index.md
  - VC: vc/index.md
  - Windows:
      - Winlogon Setup: windows/setup-winlogon-kiro.md
